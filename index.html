<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Web - Home</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #900;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        /* เอฟเฟกต์ไฟวิ่งขอบ */
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, #ff0000 0%, #660000 100%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            top: -25%;
            left: -25%;
            background-image: conic-gradient(transparent, transparent, transparent, #ffea00, transparent);
            animation: rotateFire 4s linear infinite;
        }

        @keyframes rotateFire {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .inner-content {
            position: absolute;
            inset: 5px;
            background: radial-gradient(circle, #cc0000 0%, #800000 100%);
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px; /* เว้นระยะห่างระหว่างปุ่ม */
        }

        /* สไตล์ปุ่มกด */
        .btn {
            padding: 20px 40px;
            font-size: 2rem;
            font-weight: bold;
            text-decoration: none;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid white;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            /* อนิเมชั่นลอยขึ้นลง */
            animation: floating 3s ease-in-out infinite;
        }

        /* ปุ่มที่ 2 ให้จังหวะลอยต่างกันนิดหน่อย */
        .btn-pvp { animation-delay: 1.5s; }

        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        /* ตัวหนังสือสีรุ้ง */
        .rainbow-text {
            background-image: linear-gradient(to left, violet, indigo, blue, green, yellow, orange, red);
            -webkit-background-clip: text;
            color: transparent;
            background-size: 400% 100%;
            animation: rainbowMove 5s linear infinite;
        }

        @keyframes rainbowMove {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.1) translateY(-20px);
        }

        @media (max-width: 600px) {
            .btn { font-size: 1.5rem; padding: 15px 30px; }
            .inner-content { inset: 3px; }
        } 
    </style>
</head>
<body>

    <div class="container">
        <div class="inner-content">
            <a href="farm.html" target="_blank" class="btn">
                <span class="rainbow-text">สำหรับฟาม</span>
            </a>
            <a href="pvp.html" target="_blank" class="btn btn-pvp">
                <span class="rainbow-text">PvP</span>
            </a>
        </div>
    </div>

</body>
</html>
