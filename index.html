<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #900; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: sans-serif; }
        .container { position: relative; width: 100vw; height: 100vh; background: radial-gradient(circle, #ff0000 0%, #660000 100%); overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .container::before { content: ''; position: absolute; width: 150%; height: 150%; top: -25%; left: -25%; background-image: conic-gradient(transparent, transparent, transparent, #ffea00, transparent); animation: rotateFire 4s linear infinite; }
        @keyframes rotateFire { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .inner-content { position: absolute; inset: 5px; background: radial-gradient(circle, #cc0000 0%, #800000 100%); z-index: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 30px; }
        .btn { padding: 20px 40px; font-size: 1.8rem; font-weight: bold; text-decoration: none; background: rgba(0, 0, 0, 0.4); border: 2px solid white; border-radius: 15px; animation: float 3s ease-in-out infinite; transition: 0.3s; width: 250px; text-align: center; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .rainbow { background-image: linear-gradient(to left, violet, indigo, blue, green, yellow, orange, red); -webkit-background-clip: text; color: transparent; background-size: 400%; animation: rb 5s linear infinite; }
        @keyframes rb { 0% { background-position: 0%; } 100% { background-position: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="inner-content">
            <a href="farm.html" class="btn"><span class="rainbow">สำหรับฟาม</span></a>
            <a href="pvp.html" class="btn" style="animation-delay: 1.5s;"><span class="rainbow">PvP</span></a>
        </div>
    </div>
</body>
</html>
