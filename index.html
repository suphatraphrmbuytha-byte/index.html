<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Background with Running Light</title>
    <style>
        /* ตั้งค่าพื้นฐานให้เต็มหน้าจอ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #900; /* สีแดงเข้มพื้นหลังหลัก */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* ป้องกันแถบเลื่อน */
            font-family: 'Arial', sans-serif;
        }

        /* กล่องคอนเทนเนอร์หลักที่สร้างเอฟเฟกต์ไฟวิ่ง */
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, #ff0000 0%, #660000 100%); /* ไล่เฉดสีแดงให้ดูมีมิติ */
            overflow: hidden;
        }

        /* สร้างเส้นไฟวิ่งโดยใช้ pseudo-elements */
        .container::before {
            content: '';
            position: absolute;
            /* ขยายขนาดให้ใหญ่กว่าจอเล็กน้อยเพื่อให้หมุนแล้วไม่เห็นขอบตัด */
            width: 150%;
            height: 150%;
            top: -25%;
            left: -25%;
            /* สร้างแถบไฟสีเหลือง/ขาว สลับกับสีโปร่งใส */
            background-image: conic-gradient(
                transparent, 
                transparent, 
                transparent, 
                #ffea00, /* สีไฟวิ่ง */
                transparent
            );
            animation: animate 4s linear infinite;
        }

        /* อนิเมชันการหมุนเพื่อให้ไฟดูเหมือนวิ่งรอบขอบ */
        @keyframes animate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* เลเยอร์ด้านบนเพื่อทับส่วนกลาง ให้เหลือแค่ขอบที่มองเห็นไฟ */
        .inner-content {
            position: absolute;
            inset: 5px; /* ความหนาของขอบไฟ (5px) */
            background: radial-gradient(circle, #cc0000 0%, #800000 100%);
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            border-radius: 2px;
        }

        h1 {
            font-size: 3rem;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        /* ปรับแต่งสำหรับมือถือ */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .inner-content { inset: 3px; } /* ขอบเล็กลงในมือถือ */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="inner-content">
            <h1>WELCOME</h1>
            <p>เว็บไซต์ของคุณพร้อมแล้ว</p>
        </div>
    </div>

</body>
</html>
