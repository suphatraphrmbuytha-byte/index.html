<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Onyx Script</title>
    <style>
        body { background: radial-gradient(circle, #d4af37 0%, #1e5631 100%); height: 100vh; display: flex; justify-content: center; align-items: center; font-family: sans-serif; color: white; text-align: center; padding: 20px; }
        .box { background: rgba(0,0,0,0.8); padding: 30px; border-radius: 15px; border: 2px solid #d4af37; width: 100%; max-width: 500px; }
        code { display: block; background: #111; padding: 15px; margin: 15px 0; word-break: break-all; border-radius: 5px; border: 1px solid #d4af37; font-size: 0.8rem; }
        .copy-btn { padding: 10px 30px; background: #d4af37; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color: #d4af37;">สคริปต์สำหรับฟาม (Quantum Onyx)</h2>
        <code id="scriptText">loadstring(game:HttpGet("https://raw.githubusercontent.com/flazhy/QuantumOnyx/refs/heads/main/QuantumOnyx.lua"))()</code>
        <button class="copy-btn" onclick="copy()">คัดลอกสคริปต์ฟาม</button>
    </div>
    <script>
        function copy() {
            const t = document.getElementById('scriptText').innerText;
            navigator.clipboard.writeText(t);
            alert('คัดลอกสคริปต์ Quantum Onyx แล้ว!');
        }
    </script>
</body>
</html>
