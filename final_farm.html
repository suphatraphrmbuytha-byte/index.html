<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farm Script - Quantum Onyx</title>
    <style>
        body { background: radial-gradient(circle, #d4af37 0%, #1e5631 100%); height: 100vh; display: flex; justify-content: center; align-items: center; font-family: sans-serif; color: white; text-align: center; padding: 20px; }
        .box { background: rgba(0,0,0,0.85); padding: 30px; border-radius: 15px; border: 2px solid #d4af37; width: 100%; max-width: 500px; box-shadow: 0 0 30px rgba(212, 175, 55, 0.4); }
        h2 { color: #d4af37; margin-bottom: 10px; font-size: 1.8rem; }
        p { margin-bottom: 20px; color: #ccc; }
        code { display: block; background: #111; padding: 15px; margin: 15px 0; word-break: break-all; border-radius: 5px; border: 1px solid #d4af37; font-size: 0.85rem; color: #00ff00; line-height: 1.5; }
        .copy-btn { padding: 15px 30px; background: #d4af37; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.2rem; transition: 0.3s; color: #000; }
        .copy-btn:hover { background: #fff; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="box">
        <h2>✅ ปลดล็อคสายฟามสำเร็จ!</h2>
        <p>คัดลอกสคริปต์ Quantum Onyx ด้านล่างนี้:</p>
        <code id="scriptText">loadstring(game:HttpGet("https://raw.githubusercontent.com/flazhy/QuantumOnyx/refs/heads/main/QuantumOnyx.lua"))()</code>
        <button class="copy-btn" onclick="copy()">คัดลอกสคริปต์ฟาม</button>
    </div>
    <script>
        function copy() {
            const t = document.getElementById('scriptText').innerText;
            navigator.clipboard.writeText(t).then(() => {
                alert('คัดลอกสคริปต์ Quantum Onyx เรียบร้อยแล้ว!');
            });
        }
    </script>
</body>
</html>
