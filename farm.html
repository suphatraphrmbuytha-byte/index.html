<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab - Red Background</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #900; height: 100vh; overflow: hidden; }
        .container {
            position: relative; width: 100vw; height: 100vh;
            background: radial-gradient(circle, #ff0000 0%, #660000 100%);
            overflow: hidden;
        }
        .container::before {
            content: ''; position: absolute; width: 150%; height: 150%;
            top: -25%; left: -25%;
            background-image: conic-gradient(transparent, transparent, transparent, #ffea00, transparent);
            animation: animate 4s linear infinite;
        }
        @keyframes animate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .inner-content {
            position: absolute; inset: 5px;
            background: radial-gradient(circle, #cc0000 0%, #800000 100%);
            z-index: 1;
        }
        @media (max-width: 600px) { .inner-content { inset: 3px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="inner-content"></div>
    </div>
</body>
</html>
